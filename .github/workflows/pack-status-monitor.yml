name: Pack status expiry monitor

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aic-pack-status-monitor
  cancel-in-progress: false

jobs:
  validate:
    name: Validate signed status and expiry
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Run focused monitor tests
        run: python3 -m unittest operations/pack-status/test_validate_status.py -v
      - name: Verify checked-in and live signed status
        run: |
          python3 operations/pack-status/validate_status.py \
            --warning-hours 72 \
            --hard-fail-hours 24 \
            --fail-on-warning
