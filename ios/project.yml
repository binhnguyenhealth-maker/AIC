name: AIC

options:
  bundleIdPrefix: com.binhnguyen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: GJ96397VV7

targets:
  AICCore:
    type: framework
    platform: iOS
    sources:
      - path: AICCore
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binhnguyenhealth.aic.core
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
      configs:
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) GUEST_ONLY_V1"

  AIC:
    type: application
    platform: iOS
    sources:
      - path: AIC
        excludes:
          - Config
    dependencies:
      - target: AICCore
    info:
      path: AIC/Config/Info.plist
      properties:
        CFBundleDisplayName: Am I Cooked?
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "AIC uses your location once, on this device, to estimate historical reported-incident concentration for a fixed 500-meter (about 0.3-mile) radius. Your location is not uploaded or saved."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        AIC_PRIVACY_URL: "$(AIC_PRIVACY_URL)"
        AIC_SUPPORT_URL: "$(AIC_SUPPORT_URL)"
        AIC_TERMS_URL: "$(AIC_TERMS_URL)"
        AIC_METHODOLOGY_URL: "$(AIC_METHODOLOGY_URL)"
        AIC_PACK_STATUS_URL: "$(AIC_PACK_STATUS_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binhnguyenhealth.aic
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=iphonesimulator*]": com.binhnguyenhealth.aic.showcase
        PRODUCT_NAME: AIC
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        AIC_PRIVACY_URL: "https://aic-beta-info.binhnguyenhealth.workers.dev/privacy/"
        AIC_SUPPORT_URL: "https://aic-beta-info.binhnguyenhealth.workers.dev/support/"
        AIC_TERMS_URL: "https://aic-beta-info.binhnguyenhealth.workers.dev/terms/"
        AIC_METHODOLOGY_URL: "https://aic-beta-info.binhnguyenhealth.workers.dev/methodology/"
        AIC_PACK_STATUS_URL: "https://aic-beta-info.binhnguyenhealth.workers.dev/pack-status/v1/status.json"
      configs:
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) GUEST_ONLY_V1"

  AICTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: AIC
    sources:
      - path: Tests/AICAppTests
      - path: Tests/AICCoreTests
    dependencies:
      - target: AIC
      - target: AICCore
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binhnguyenhealth.aic.tests
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) GUEST_ONLY_V1"

schemes:
  AIC:
    build:
      targets:
        AIC: all
        AICCore: all
    test:
      targets:
        - AICTests
